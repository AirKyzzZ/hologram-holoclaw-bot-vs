metadata:
  id: github-agent
  displayName: GitHub MCP Agent
  description: >-
    A multi-language AI agent with GitHub MCP integration for managing repositories,
    issues, pull requests, and code search via the Hologram + Verana ecosystem.
  defaultLanguage: en
  tags:
    - github
    - mcp
    - hologram

